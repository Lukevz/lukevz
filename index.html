<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Luke van Zyl</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Luke van Zyl">
  <meta property="og:description" content="What I'm working on, what's landed, what got cut.">
  <meta property="og:image" content="images/og-header.png">
  <meta property="og:url" content="https://lukevz.com">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Luke van Zyl">
  <meta name="twitter:description" content="What I'm working on, what's landed, what got cut.">
  <meta name="twitter:image" content="images/og-header.png">

  <link rel="icon" type="image/png" href="images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flipboard.css">
</head>
<body>
  <!-- Hamburger menu overlay + drawer -->
  <div class="vb-menu-overlay" id="vbMenuOverlay"></div>
  <div class="vb-menu" id="vbMenu">
    <div class="vb-menu-top">
      <span class="vb-site-name">LUKE VAN ZYL</span>
      <button class="vb-menu-close" id="vbMenuClose" aria-label="Close menu">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <nav class="vb-nav">
      <a href="/" class="vb-nav-link active">FLIGHTS</a>
      <a href="/work" class="vb-nav-link">WORK</a>
      <a href="/about" class="vb-nav-link">ABOUT</a>
    </nav>
  </div>

  <div class="vb-page">
    <header class="vb-header">
      <!-- Left: hamburger -->
      <button class="vb-hamburger" id="vbHamburger" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Center: status tabs -->
      <nav class="vb-status-tabs" id="statusTabs">
        <button class="vb-status-tab active" data-status="IN FLIGHT">IN FLIGHT</button>
        <button class="vb-status-tab" data-status="ARRIVED">ARRIVED</button>
        <button class="vb-status-tab" data-status="CANCELLED">CANCELLED</button>
      </nav>

      <!-- Right: version selector -->
      <div class="vb-version-selector" id="vbVersionSelector">
        <span class="vb-version-label">V2</span>
        <button class="vb-version-btn" id="vbVersionBtn" aria-label="Select version">
          <svg class="vb-version-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="vb-version-dropdown" id="vbVersionDropdown">
          <a href="/v1/" class="vb-version-option">V1</a>
          <span class="vb-version-option active">V2</span>
        </div>
      </div>
    </header>

    <main class="vb-board-section">
      <div class="vb-board-wrap">
        <div class="vb-board-frame">
          <div class="vb-board-grid" id="boardGrid">
            <!-- 10 rows × 36 cols of flip tiles, generated by JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="flipboard.js"></script>
</body>
</html>
