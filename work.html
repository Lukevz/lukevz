<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Work - Luke van Zyl</title>
  
  <link rel="icon" type="image/png" href="images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flipboard.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="site-title">LUKE VAN ZYL</h1>
      <nav class="nav">
        <a href="/" class="nav-link">FLIGHTS</a>
        <a href="/work" class="nav-link active">WORK</a>
        <a href="/about" class="nav-link">ABOUT</a>
      </nav>
    </header>

    <main class="main">
      <div class="work-archive">
        <h2 class="work-title">ARCHIVE</h2>
        <p class="work-subtitle">A complete log of past flights.</p>
        
        <div class="work-list" id="workList">
          <!-- Work items will be dynamically inserted here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Theme Switcher -->
  <div class="theme-switcher">
    <a href="/v1/" class="theme-switcher-btn">V1</a>
    <span class="theme-switcher-divider">|</span>
    <span class="theme-switcher-btn active">V2</span>
  </div>

  <script type="module" src="flipboard.js"></script>

</html>
