<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now · Luke van Zyl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f2f1ee;
      --board:      #3d3b38;
      --cell:       #4d4a46;
      --cell-top:   #545150;
      --cell-text:  #ffffff;
      --label:      #c8c3bc;
      --split:      #302e2c;
      --muted:      #9a9790;
      --text:       #3a3d45;

      --cell-w:     20px;
      --cell-h:     34px;
      --cell-gap:   2px;
      --cell-font:  15px;
      --label-w:    96px;

      --mono: 'Courier New', 'Lucida Console', monospace;
      --ui:   'Space Grotesk', system-ui, sans-serif;
    }

    @media (max-width: 700px) {
      :root {
        --cell-w:    14px;
        --cell-h:    26px;
        --cell-gap:  1.5px;
        --cell-font: 11px;
        --label-w:   72px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --cell-w:    10px;
        --cell-h:    20px;
        --cell-gap:  1px;
        --cell-font: 8.5px;
        --label-w:   52px;
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--ui);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 60px;
    }

    /* ── Nav chrome ── */
    .back {
      position: fixed;
      top: 24px; left: 24px;
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      z-index: 50;
    }
    .back:hover { color: var(--text); }
    .back svg { width: 13px; height: 13px; flex-shrink: 0; }

    .sound-btn {
      position: fixed;
      top: 22px; right: 22px;
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      background: none;
      border: 1px solid #dedad5;
      border-radius: 7px;
      padding: 6px 10px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      z-index: 50;
    }
    .sound-btn:hover { color: var(--text); border-color: #c0bdb8; }
    .sound-btn.on    { color: var(--text); border-color: #c0bdb8; }

    .sound-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .sound-btn.on .sound-dot { background: var(--text); }

    /* ── Page copy ── */
    .page-intro {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-intro h1 {
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    /* ── Board ── */
    .board-wrap { width: 100%; max-width: 800px; }

    .board {
      background: var(--board);
      border-radius: 18px;
      padding: 28px 32px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.05) inset,
        0 -1px 0 rgba(0,0,0,0.5) inset,
        0 2px 0 rgba(255,255,255,0.02) inset,
        0 32px 80px rgba(0,0,0,0.2),
        0 8px 24px rgba(0,0,0,0.14),
        0 2px 6px rgba(0,0,0,0.1);
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid #2a2825;
      margin-bottom: 16px;
    }

    .board-head-left {
      display: flex; align-items: baseline; gap: 14px;
    }

    .board-wordmark {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #c8c3bc;
    }

    .board-subtitle {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #b5b0a8;
    }

    .board-airline {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #b5b0a8;
    }

    /* ── Rows ── */
    .rows { display: flex; flex-direction: column; gap: 7px; }

    .row {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 5px 6px;
      border-radius: 8px;
      position: relative;
      transition: background 0.15s;
    }
    .row:hover { background: rgba(255,255,255,0.022); }
    .row.has-note { cursor: default; }

    .row-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--label);
      width: var(--label-w);
      flex-shrink: 0;
      text-align: right;
      user-select: none;
    }

    .row-cells {
      display: flex;
      gap: var(--cell-gap);
    }

    /* ── Cell ── */
    .cell {
      position: relative;
      width: var(--cell-w);
      height: var(--cell-h);
      border-radius: 3px;
      background: var(--cell);
      flex-shrink: 0;
      perspective: 140px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.05) inset,
        0 1px 3px rgba(0,0,0,0.45),
        0 0 0 0.5px rgba(0,0,0,0.3);
    }

    /* Top/bottom static halves */
    .ct, .cb, .ft, .fb {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
    }
    .ct, .ft { top: 0;   background: var(--cell-top); }
    .cb, .fb { top: 50%; background: var(--cell); }

    /* Layering: flaps sit above static halves */
    .ct { z-index: 1; }
    .cb { z-index: 1; }
    .ft { z-index: 3; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform-origin: center bottom; }
    .fb { z-index: 2; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform-origin: center top; }

    /* Character wrap inside each half */
    .cw {
      display: block;
      width: 100%;
      height: var(--cell-h);
      line-height: var(--cell-h);
      font-family: var(--mono);
      font-size: var(--cell-font);
      font-weight: 700;
      color: var(--cell-text);
      text-align: center;
      user-select: none;
    }

    /* Bottom halves: shift char up so only bottom half is visible */
    .cb .cw, .fb .cw {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
    }

    /* The split line */
    .cell::after {
      content: '';
      position: absolute;
      top: calc(50% - 0.5px);
      left: 0; right: 0;
      height: 1px;
      background: var(--split);
      z-index: 10;
      pointer-events: none;
    }

    /* ── Note tooltip ── */
    .row-note {
      position: absolute;
      bottom: calc(100% + 10px);
      left: calc(var(--label-w) + 18px);
      background: #f7f5f2;
      border: 1px solid #e5e2dd;
      border-radius: 9px;
      padding: 8px 13px;
      font-size: 12px;
      color: #5a5752;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.18s, transform 0.18s;
      z-index: 30;
      box-shadow: 0 4px 18px rgba(0,0,0,0.09);
    }
    .row-note::after {
      content: '';
      position: absolute;
      top: 100%; left: 20px;
      border: 5px solid transparent;
      border-top-color: #e5e2dd;
    }
    .row.has-note:hover .row-note { opacity: 1; transform: translateY(0); }

    /* ── Board footer ── */
    .board-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 18px;
      margin-top: 14px;
      border-top: 1px solid #2a2825;
    }

    .foot-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.25em;
      color: #b5b0a8;
    }

    .foot-cells { display: flex; gap: 1.5px; }

    .foot-cell {
      width: 14px;
      height: 22px;
      background: #4d4a46;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .foot-cell::after {
      content: '';
      position: absolute;
      top: calc(50% - 0.5px);
      left: 0; right: 0;
      height: 0.5px;
      background: #302e2c;
    }
    .foot-char {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: #ffffff;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <a href="/" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    home
  </a>

  <button class="sound-btn" id="soundBtn">
    <span class="sound-dot"></span>
    <span id="soundLabel">SOUND</span>
  </button>

  <div class="page-intro">
    <h1>Now</h1>
  </div>

  <div class="board-wrap">
    <div class="board">
      <div class="board-head">
        <div class="board-head-left">
          <span class="board-wordmark">NOW</span>
          <span class="board-subtitle">DEPARTURES</span>
        </div>
        <span class="board-airline">LUKE VAN ZYL</span>
      </div>
      <div class="rows" id="rows"></div>
      <div class="board-foot">
        <span class="foot-label">UPDATED</span>
        <div class="foot-cells" id="footCells"></div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ─── Audio ─────────────────────────────────────── */
    let soundOn = false;
    let actx = null;

    function getCtx() {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      return actx;
    }

    function tick() {
      if (!soundOn) return;
      try {
        const ctx = getCtx();
        const n   = Math.floor(ctx.sampleRate * 0.016);
        const buf = ctx.createBuffer(1, n, ctx.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.0025)) * 0.4;
        }
        const src  = ctx.createBufferSource();
        const gain = ctx.createGain();
        src.buffer  = buf;
        gain.gain.value = 0.45;
        src.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      } catch (e) {}
    }

    const soundBtn   = document.getElementById('soundBtn');
    const soundLabel = document.getElementById('soundLabel');

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.classList.toggle('on', soundOn);
      soundLabel.textContent = soundOn ? 'SOUND ON' : 'SOUND';
      if (soundOn) { try { getCtx().resume(); tick(); } catch (e) {} }
    });


    /* ─── Cell ───────────────────────────────────────── */
    /*
     *  .cell
     *    .ct .cw   ← static top half (new char, revealed as .ft falls away)
     *    .cb .cw   ← static bottom half (old char → updated after animation)
     *    .ft .cw   ← top flap:    old char, rotates 0° → -90° (falls forward)
     *    .fb .cw   ← bottom flap: new char, rotates 90° → 0°  (swings in)
     *  ::after     ← split line
     */
    function makeCell(parent) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.innerHTML =
        '<div class="ct"><div class="cw"> </div></div>' +
        '<div class="cb"><div class="cw"> </div></div>' +
        '<div class="ft"><div class="cw"> </div></div>' +
        '<div class="fb"><div class="cw"> </div></div>';

      const ct   = el.querySelector('.ct .cw');
      const cb   = el.querySelector('.cb .cw');
      const ftEl = el.querySelector('.ft');
      const fbEl = el.querySelector('.fb');
      const ft   = ftEl.querySelector('.cw');
      const fb   = fbEl.querySelector('.cw');

      // Start: .ft visible at 0°, .fb hidden at 90° (folded under)
      ftEl.style.transform = 'rotateX(0deg)';
      fbEl.style.transform = 'rotateX(90deg)';

      let cur = ' ';

      function setChar(nc, animate) {
        nc = nc || ' ';
        if (!animate || nc === cur) {
          cur = nc;
          ct.textContent = nc; cb.textContent = nc;
          ft.textContent = nc;  fb.textContent = nc;
          ftEl.style.transition = ''; ftEl.style.transform = 'rotateX(0deg)';
          fbEl.style.transition = ''; fbEl.style.transform = 'rotateX(90deg)';
          return Promise.resolve();
        }
        const old = cur;
        cur = nc;

        return new Promise(resolve => {
          // Pre-set new char in static background (covered by flaps)
          ct.textContent = nc;     // top static: new char (will peek out as ft falls)
          // cb still has old char (fb will cover it)
          ft.textContent = old;    // top flap: old char about to fall
          fb.textContent = nc;     // bottom flap: new char about to swing in

          // Snap fb back to start (no transition)
          fbEl.style.transition = 'none';
          fbEl.style.transform  = 'rotateX(90deg)';
          void fbEl.offsetWidth; // force reflow

          // Step 1: top flap falls (0° → -90°)
          ftEl.style.transition = 'transform 140ms ease-in';
          ftEl.style.transform  = 'rotateX(-90deg)';

          // Step 2: bottom flap swings in (90° → 0°), starts halfway through step 1
          setTimeout(() => {
            fbEl.style.transition = 'transform 140ms ease-out';
            fbEl.style.transform  = 'rotateX(0deg)';
            tick();
          }, 70);

          // Cleanup after both transitions complete
          setTimeout(() => {
            cb.textContent = nc;                         // static bottom now shows new char
            fbEl.style.transition = 'none';
            fbEl.style.transform  = 'rotateX(90deg)';   // reset fb to hidden
            ftEl.style.transition = 'none';
            ftEl.style.transform  = 'rotateX(0deg)';    // reset ft to visible
            ft.textContent = nc;                         // ft also updated
            resolve();
          }, 70 + 155);
        });
      }

      parent.appendChild(el);
      return { el, setChar };
    }


    /* ─── Row ────────────────────────────────────────── */
    const MAX = 24;

    function makeRow(parent, label, note) {
      const row = document.createElement('div');
      row.className = 'row' + (note ? ' has-note' : '');

      const lbl = document.createElement('div');
      lbl.className = 'row-label';
      lbl.textContent = label;

      const cellsWrap = document.createElement('div');
      cellsWrap.className = 'row-cells';

      const cells = [];
      for (let i = 0; i < MAX; i++) cells.push(makeCell(cellsWrap));

      row.appendChild(lbl);
      row.appendChild(cellsWrap);

      if (note) {
        const noteEl = document.createElement('div');
        noteEl.className = 'row-note';
        noteEl.textContent = note;
        row.appendChild(noteEl);
      }

      parent.appendChild(row);

      function setValue(val, animate, baseDelay) {
        baseDelay = baseDelay || 0;
        const padded = (val || '').toUpperCase().padEnd(MAX, ' ').slice(0, MAX);
        const promises = [];
        for (let i = 0; i < MAX; i++) {
          const ch = padded[i];
          if (animate) {
            const d = baseDelay + i * 88;
            promises.push(new Promise(r => setTimeout(() => cells[i].setChar(ch, true).then(r), d)));
          } else {
            cells[i].setChar(ch, false);
          }
        }
        return Promise.all(promises);
      }

      return { row, setValue };
    }


    /* ─── Footer date ────────────────────────────────── */
    function renderFooterDate(dateStr) {
      const wrap = document.getElementById('footCells');
      wrap.innerHTML = '';
      const chars = dateStr.replace(/-/g, '·');
      for (const ch of chars) {
        const cell = document.createElement('div');
        cell.className = 'foot-cell';
        const span = document.createElement('span');
        span.className = 'foot-char';
        span.textContent = ch;
        cell.appendChild(span);
        wrap.appendChild(cell);
      }
    }


    /* ─── Board init ─────────────────────────────────── */
    const LABELS       = ['READING','LISTENING','BUILDING','WRITING','WATCHING','THINKING','LOCATION'];
    const ROW_STAGGER  = 190; // ms between row start times
    const rowsEl       = document.getElementById('rows');

    // Render skeleton rows immediately with dashes
    const rows = LABELS.map(lbl => makeRow(rowsEl, lbl, null));
    rows.forEach(r => r.setValue('–'.repeat(MAX), false));

    // Fetch data and animate in
    fetch('/src/data/now.json')
      .then(res => res.json())
      .then(data => {
        // Patch in notes if present
        data.items.forEach((item, i) => {
          if (item.note && rows[i]) {
            rows[i].row.classList.add('has-note');
            const noteEl = document.createElement('div');
            noteEl.className = 'row-note';
            noteEl.textContent = item.note;
            rows[i].row.appendChild(noteEl);
          }
        });

        renderFooterDate(data.updatedAt || '');

        // Staggered flip-in from dashes to real values
        data.items.forEach((item, i) => {
          if (rows[i]) rows[i].setValue(item.value, true, i * ROW_STAGGER);
        });
      })
      .catch(() => {
        // Fallback: flip in with embedded defaults
        const defaults = [
          { value: 'Piranesi'       },
          { value: 'Hand Habits'    },
          { value: 'Axon Labs'      },
          { value: 'WFH systems'    },
          { value: 'Severance S2'   },
          { value: 'Slow attention' },
          { value: 'Atlanta, GA'    }
        ];
        renderFooterDate('2026-03-14');
        defaults.forEach((item, i) => {
          if (rows[i]) rows[i].setValue(item.value, true, i * ROW_STAGGER);
        });
      });

  }());
  </script>
</body>
</html>
